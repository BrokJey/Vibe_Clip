spring:
  datasource:
    url: jdbc:h2:mem:vibeclipdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: 8000

vibeclip:
  jwt:
    secret: change-me-to-a-secure-random-value-base64
    expiration-ms: 3600000

logging:
  level:
    org.hibernate.SQL: DEBUG

